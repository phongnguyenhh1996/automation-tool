# Selectors and URLs — adjust after inspecting coinmap.tech with DevTools or Playwright codegen.
# Delete existing images in data/charts before each capture run (keeps .gitkeep)
clear_charts_before_capture: true
base_url: "https://coinmap.tech"
login_url: "https://coinmap.tech/login"
# CSS selectors
email_selector: 'input[type="email"], input[name="email"], input#email'
password_selector: 'input[type="password"]'
submit_selector: 'button[type="submit"], button:has-text("Sign in"), button:has-text("Log in")'
# Wait for this selector after login (empty = skip)
post_login_wait_selector: "main, [data-testid='chart'], canvas, .chart"

# After login: open chart page — multi-shot via right sidebar (3 images), or one fullscreen of whatever is already open
chart_download:
  enabled: true
  chart_page_url: "https://coinmap.tech/chart"
  # Coinmap often auto-opens symbol search on /chart — close it (automation no longer uses that modal).
  dismiss_symbol_search_modal: true
  symbol_search_modal_escape_presses: 2
  symbol_modal_escape_gap_ms: 180
  after_symbol_modal_dismiss_ms: 350
  # Optional: e.g. .ant-modal-close, button[aria-label="Close"] if Escape is not enough
  symbol_search_modal_close_selector: ""
  # Right sidebar → watchlist category → symbol → close → interval → pan chart → fullscreen → screenshot → Esc
  multi_shot_enabled: true
  capture_plan:
    # symbol = watchlist id trên Coinmap; export_symbol = nhãn giống TradingView (file JSON/PNG + trường symbol).
    - symbol: USDINDEX
      export_symbol: DXY
      interval: "15m"
      watchlist_category: "forex 1"
    - symbol: XAUUSD
      interval: "15m"
      watchlist_category: "forex 1"
    - symbol: XAUUSD
      interval: "5m"
  right_sidebar_container_class_prefix: "ChartDesktopPage_rightSidebar__"
  # Chart SVG can sit on top and block hit-testing — force click the sidebar toggle.
  right_sidebar_toggle_click_force: true
  right_sidebar_action_button_class_prefix: "ChartDesktopPage_actionButton"
  # Optional full selector if layout differs
  right_sidebar_toggle_button_selector: ""
  # Open watchlist: click toggle until title row is visible (some UIs need 2+ toggles from rail state)
  right_sidebar_already_open_check_ms: 2000
  right_sidebar_open_max_toggles: 4
  watchlist_title_class_prefix: "ChartWatchList_title__"
  watchlist_title_visible_timeout_ms: 20000
  watchlist_ant_select_visible_timeout_ms: 15000
  watchlist_symbol_name_class_prefix: "TableData_symbolNameContent__"
  interval_select_class_prefix: "IntervalSelect_intervalSelect__"
  sidebar_toggle_after_click_ms: 450
  watchlist_dropdown_open_ms: 350
  # Ant Select: options use div.ant-select-item-option[title] + .ant-select-item-option-content
  watchlist_option_visible_timeout_ms: 15000
  after_watchlist_category_ms: 400
  after_watchlist_symbol_click_ms: 700
  interval_dropdown_open_ms: 350
  interval_option_visible_timeout_ms: 15000
  after_interval_select_ms: 800
  after_interval_change_settle_ms: 2000
  after_fullscreen_escape_ms: 600
  # Exit fullscreen after screenshot: button in SectionHeader_rightControls + SectionHeader_actionButton (index often differs from enter).
  coinmap_fullscreen_exit_use_toolbar_click: true
  coinmap_fullscreen_exit_action_button_index: 0
  coinmap_fullscreen_exit_click_force: true
  coinmap_fullscreen_exit_after_toolbar_click_ms: 450
  # Optional Escape presses after toolbar click (0 = toolbar only).
  coinmap_fullscreen_exit_escape_after_toolbar_presses: 0
  coinmap_fullscreen_exit_escape_gap_ms: 200
  # Each multi-shot loop start: Escape only (safe if not fullscreen; toolbar would wrongly enter fullscreen).
  coinmap_fullscreen_loop_start_escape_presses: 1
  # Dark mode: if theme button has no span.anticon-sun, click it (before light-theme confirm)
  dark_mode_enabled: true
  dark_mode_theme_button_selector: '[class*="Header_menuIconTheme"]'
  dark_mode_sun_icon_selector: "span.anticon-sun"
  dark_mode_after_click_ms: 400
  # Optional: modal asking to use light theme — click Confirm if it appears (no-op if absent)
  light_theme_confirm_enabled: true
  light_theme_confirm_selector: 'button:has-text("Confirm"), button:has-text("OK"), button:has-text("Continue")'
  light_theme_modal_wait_ms: 2500
  # Fullscreen enter vs exit: different 0-based indices under SectionHeader_rightControls
  section_header_action_class_prefix: "SectionHeader_actionButton"
  section_header_action_parent_selector: '[class*="SectionHeader_rightControls"]'
  action_button_index: 1
  # Enter fullscreen: set true if chart blocks the header button hit-test.
  fullscreen_action_button_click_force: false
  fullscreen_screenshot_settle_ms: 1500
  # Viewport-only capture usually looks cleaner than full-page scroll at large sizes.
  fullscreen_screenshot_full_page: false
  # After fullscreen: edge drags (same as chart drag; cursor on time axis = bottom, on price = right), then main pan.
  chart_view_adjustments_enabled: true
  # Interactive chart surface (SVG). Avoid canvas#bg — crosshair SVG sits on top and breaks hover().
  chart_interaction_selector: "svg.react-stockchart-canvas, svg[class*='react-stockchart']"
  chart_between_pan_ms: 200
  chart_edge_pan_drag_steps: 12
  # Time (X): horizontal drag with cursor on bottom edge (center-bottom). Repeat N times.
  chart_time_edge_pan_enabled: true
  chart_time_edge_pan_repeats: 1
  chart_time_edge_pan_y_ratio: 0.98
  chart_time_edge_pan_start_x_ratio: 0.1
  chart_time_edge_pan_end_x_ratio: 0.8
  # Price (Y): vertical drag with cursor on right edge (center-right).
  chart_price_edge_pan_enabled: true
  chart_price_edge_pan_x_ratio: 0.98
  chart_price_edge_pan_start_y_ratio: 0.42
  chart_price_edge_pan_end_y_ratio: 0.38
  # Main chart area: horizontal pan (middle of SVG).
  chart_pan_start_x_ratio: 0.28
  chart_pan_end_x_ratio: 0.4
  chart_pan_y_ratio: 0.52
  chart_pan_drag_steps: 14
  chart_after_adjust_ms: 800
  # false = không chụp PNG Coinmap, chỉ lưu JSON API. Với mode network_capture + UI chart, tool vẫn pan để merge response; với bearer_request + skip UI thì không pan. TradingView không đổi.
  coinmap_screenshot_enabled: false
  # Before screenshot: if layer tooltip is open (height > threshold), click layer-list toggle.
  layer_tooltip_toggle_before_screenshot: true
  layer_tooltip_selector: '[class*="layerTooltip"]'
  layer_list_toggle_button_selector: '[class*="buttonToggleLayerList"]'
  layer_tooltip_min_height_px: 19
  after_layer_toggle_click_ms: 400

  # JSON Coinmap: mặc định bearer_request — bắt Bearer từ trình duyệt rồi gọi cm-api bằng httpx (3 endpoint song song / shot; API-only: các shot capture_plan song song).
  # mode: bearer_request (mặc định trong code nếu không khai báo) | network_capture (bắt response khi chart load) | request (Bearer tĩnh trong request_headers).
  # network_capture: merge_repeated_endpoint_responses / network_capture_* áp dụng khi mode: network_capture.
  # bearer_skip_chart_ui: true = không mở sidebar multi-shot Coinmap; chỉ trigger + Bearer + JSON. false = UI đầy đủ + Bearer sau mỗi bước.
  # bearer_http_parallel: true = httpx song song 3 endpoint; bearer_parallel_max_concurrency: 0 = không giới hạn shot API-only.
  api_data_export:
    enabled: true
    mode: bearer_request
    bearer_skip_chart_ui: true
    bearer_http_parallel: true
    bearer_parallel_max_concurrency: 0
    bearer_ready_timeout_ms: 25000
    bearer_trigger_url: "https://coinmap.tech/chart"
    bearer_capture_url_substrings: []
    send_m_affiliate: true
    m_affiliate: "CM"
    auto_countback: 1000
    auto_time_padding_ms: 0
    # Gộp response khi mode: network_capture (kéo chart → API gọi lại).
    merge_repeated_endpoint_responses: true
    network_capture_max_responses_per_endpoint: 0
    relax_symbol_filter_if_empty: true
    slim_export_on_disk: true
    network_capture_wait_ms: 12000
    network_capture_poll_ms: 300
    fail_on_api_error: false
    max_nonjson_body_chars: 8000
    http_method: GET
    request_headers: {}
    endpoints:
      getcandlehistory: "https://gw.coinmap.tech/cm-api/api/v1/getcandlehistory"
      getorderflowhistory: "https://gw.coinmap.tech/cm-api/api/v1/getorderflowhistory"
      getindicatorsvwap: "https://gw.coinmap.tech/cm-api/api/v1/getindicatorsvwap"
    query_template:
      asset: ""
      typedata: dly
      type: forex
      exchange: AXI
      symbol: "{symbol}"
      resolution: "{resolution}"
      from: "{from_ms}"
      to: "{to_ms}"
      countback: "{countback}"
      period: day
      source: hlc3
      bandsmultiplier: "1,2,3"
    extra_query: {}

# Second browser tab after Coinmap chart step: [TradingView Vietnam XAUUSD](https://vn.tradingview.com/chart/?symbol=OANDA%3AXAUUSD)
tradingview_capture:
  enabled: true
  # data_source: browser | tvdatafeed — tvdatafeed = OHLC JSON (library tvdatafeed), không mở tab TradingView trong capture
  data_source: tvdatafeed
  tvdatafeed:
    n_bars: 1000
    parallel_max_workers: 4
    exchange: OANDA
    symbol_exchanges:
      DXY: CAPITALCOM
      XAUUSD: OANDA
  # Viewport: same as session `viewport_width` / `viewport_height` below (omit per-tab sizes).
  chart_url: "https://vn.tradingview.com/chart/?symbol=OANDA%3AXAUUSD"
  # Uses COINMAP_EMAIL + TRADINGVIEW_PASSWORD (.env). Opens top-left menu; if "Đăng nhập" is visible, logs in.
  login_enabled: true
  login_menu_open_ms: 500
  login_sign_in_visible_timeout_ms: 5000
  login_sign_in_text: "Đăng nhập"
  # Optional: CSS for the sign-in entry (default: exact text match)
  login_sign_in_selector: ""
  login_after_sign_in_click_ms: 1500
  # Optional extra step for auth method picker (e.g. click "Email" before fields appear).
  # Priority: selector first; if empty, exact text match.
  login_email_method_selector: 'button[name="Email"]'
  login_email_method_text: "Email"
  login_method_visible_timeout_ms: 8000
  login_after_method_click_ms: 1000
  login_email_selector: ""
  login_password_selector: ""
  login_submit_selector: ""
  # If the form is inside an iframe, set e.g. iframe[src*="accounts"]
  login_iframe_selector: ""
  # After submit the login layer closes; wait for chart (default: same as intervals_toolbar_id)
  login_chart_ready_selector: ""
  login_chart_ready_timeout_ms: 90000
  # Short pause after chart is visible (ms); set 0 to skip
  login_post_submit_settle_ms: 800
  # Top-left app menu: open → if theme-switcher has no checked input, click for dark → close menu
  dark_mode_enabled: true
  dark_mode_menu_button_class_prefix: "topLeftButton-"
  theme_switcher_label_for: "theme-switcher"
  # Relative to that label; real DOM is switchWrap > span > input#theme-switcher (not first div)
  theme_switch_input_selector: "input#theme-switcher"
  dark_mode_menu_open_ms: 500
  dark_mode_after_theme_click_ms: 600
  intervals_toolbar_id: "header-toolbar-intervals"
  # Multi-shot: watchlist → symbol → each interval → toolbar screenshot → open image in new tab → save .url (default).
  # Set tradingview_snapshot_url_flow: false to use legacy fullscreen + Playwright PNG.
  tradingview_snapshot_url_flow: true
  screenshot_button_selector: "#header-toolbar-screenshot"
  snapshot_open_in_new_tab_selector: '[data-qa-id="open-image-in-new-tab"]'
  snapshot_image_selector: "img.tv-snapshot-image"
  after_screenshot_button_ms: 600
  snapshot_new_tab_timeout_ms: 45000
  snapshot_tab_settle_ms: 1000
  after_snapshot_escape_ms: 500
  multi_shot_enabled: true
  capture_plan:
    - symbol: DXY
      intervals:
        - "4 giờ"
        - "1 giờ"
        - "15 phút"
    - symbol: XAUUSD
      intervals:
        - "4 giờ"
        - "1 giờ"
        - "15 phút"
        - "5 phút"
  watchlist_button_aria_label: "Danh sách theo dõi, thông tin chi tiết và tin tức"
  # Khi giao diện TradingView tiếng Anh (aria khác); có thể ghi đè
  watchlist_button_aria_label_fallback: "Watchlist, details, and news"
  watchlist_open_ms: 500
  symbol_name_class_prefix: "symbolNameText-"
  after_symbol_select_ms: 1500
  after_fullscreen_escape_ms: 800
  # Watchlist realtime price monitor (no alerts): để trống để tự dùng symbol active
  # (data/.main_chart_symbol hoặc env AUTOMATION_MAIN_SYMBOL). Nếu set, phải khớp data-symbol-short trên TradingView.
  watchlist_symbol_short: ""
  watchlist_row_selector: '[data-symbol-short="{symbol}"]'
  # Scope under the row element (avoid relying on hash classes like *-RsFlttSS).
  watchlist_last_cell_selector: 'span[class*="cell"][class*="last"] span[class*="inner"]'
  watchlist_poll_seconds: 10
  # Only parse price when the span does NOT have these highlight class prefixes.
  watchlist_price_stable_class_prefix_denylist:
    - "highlightUp-"
    - "highlightDown-"
  # Inactive timeframe radios stay in DOM but hidden
  interval_button_click_force: true
  # Legacy single-shot only when multi_shot_enabled: false
  interval_button_aria_label: "15 phút"
  fullscreen_button_selector: "#header-toolbar-fullscreen"
  # Wait for fullscreen "panels hidden" toast (container-default + notice-*) to hide before screenshot
  tradingview_fullscreen_notice_selector: 'div[class*="container-default-"][class*="notice-"]'
  tradingview_fullscreen_notice_visible_timeout_ms: 10000
  tradingview_fullscreen_notice_hide_timeout_ms: 45000
  # tradingview_fullscreen_notice_wait_disabled: false
  # Tab Nhật ký (CLI ``tv-journal-monitor``); mặc định khớp DOM TradingView tiếng Việt
  # Đồng bộ 3 cảnh báo (CLI all / update / tv-alerts): mở sidebar Cảnh báo → tab Danh sách
  # Nếu timeout panel list: tăng alerts_list_panel_timeout_ms (mặc định 60000)
  # alerts_list_tab_selector: '[role="tab"][aria-controls="id_alert-widget-tabs-slots_tabpanel_list"]'
  journal_log_tab_selector: 'button#log[role="tab"]'
  journal_log_panel_selector: "#id_alert-widget-tabs-slots_tabpanel_log"
  # Dòng giá trong tab Nhật ký: alert-log-item (không dùng alert-item-description — đó là tab Danh sách)
  journal_item_description_selector: 'div[data-name="alert-log-item"] > div:first-child'
  journal_after_tab_ms: 400
  initial_settle_ms: 3000
  after_interval_select_ms: 2000
  fullscreen_settle_ms: 2000
  fullscreen_screenshot_full_page: true

# If true, still run the legacy canvas screenshot loop after the chart page screenshot
screenshot_after_chart_download: false
# Screenshot each matching element (Playwright locator); add more as needed
chart_selectors:
  - "canvas"
# If no elements match, fall back to one full-page screenshot (set false to disable)
fallback_full_page: true
# Browser viewport for the whole capture session (Coinmap tab + TradingView tab).
viewport_width: 1600
viewport_height: 900

# Milliseconds to wait after navigation before screenshots
settle_ms: 2000
# Max charts to capture (0 = no limit) — applies to screenshot loop only
max_charts: 50
